services:
  prometheus:
    image: prom/prometheus:latest
    container_name: l2-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    extra_hosts:
      # host.docker.internal is the documented way to reach a port the app
      # publishes on the host from inside a container on Docker Desktop
      # (Windows/Mac). The extra_hosts entry below additionally makes it
      # resolve on plain Docker Engine (e.g. Linux CI), so this file has no
      # host-networking tricks and no OS-specific assumptions either way.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: l2-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
